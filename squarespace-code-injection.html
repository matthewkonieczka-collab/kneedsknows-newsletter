<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* Remove Squarespace header and all top spacing */
  header, .header, .page-header, .page-title, .page-description,
  .header-announcement-bar-wrapper, .sqs-announcement-bar,
  .header--bottom, .header--top, nav, .header-nav {
    display: none !important;
  }
  body, #page, #content, main, .content-wrapper,
  section.page-section, section.page-section:first-child,
  .page-section .content-wrapper, .sqs-layout {
    padding-top: 0 !important;
    margin-top: 0 !important;
  }

  /* Base */
  #kk-page { font-family: 'Montserrat', sans-serif; text-align: center; max-width: 560px; margin: 0 auto; padding: 0 24px 80px; }
  #kk-page h2 { font-size: 2rem; font-weight: 700; color: #d4af37; margin: 0 0 8px; }
  #kk-page .sub { font-size: 1rem; color: #999; margin: 0 0 32px; line-height: 1.6; }

  /* Subscribe Form */
  #kk-form { display: flex; flex-direction: column; gap: 14px; }
  #kk-form .row { display: flex; gap: 12px; }
  #kk-form input { padding: 14px 16px; border: 1px solid #333; border-radius: 8px; background: #111; color: #fff; font-size: 0.95rem; font-family: inherit; outline: none; width: 100%; box-sizing: border-box; }
  #kk-form input:focus { border-color: #d4af37; }
  #kk-form input::placeholder { color: #666; }
  .kk-btn { padding: 16px; border: none; border-radius: 8px; background: #d4af37; color: #000; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; letter-spacing: 0.5px; transition: background 0.2s; width: 100%; }
  .kk-btn:hover { background: #e5c349; }
  #kk-msg { margin: 16px 0 0; font-size: 0.9rem; color: #999; min-height: 24px; }
  .kk-fine { margin: 24px 0 0; font-size: 0.75rem; color: #555; }

  /* Counter */
  .kk-counter { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 40px 0 0; font-size: 0.85rem; color: #777; }
  .kk-counter-num { font-size: 1.5rem; font-weight: 700; color: #d4af37; }

  /* Section Labels */
  .kk-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #d4af37; margin: 48px 0 20px; }

  /* Perk Cards */
  .kk-perk-wrap { position: relative; overflow: hidden; height: 110px; margin: 0 0 12px; }
  .kk-perk { position: absolute; width: 100%; opacity: 0; transition: opacity 0.5s, transform 0.5s; transform: translateY(14px); background: #141414; border: 1px solid #252525; border-radius: 10px; padding: 22px 24px; text-align: left; box-sizing: border-box; }
  .kk-perk.active { opacity: 1; transform: translateY(0); }
  .kk-perk h4 { font-size: 1rem; font-weight: 700; color: #fff; margin: 0 0 6px; }
  .kk-perk p { font-size: 0.83rem; color: #888; line-height: 1.5; margin: 0; }
  .kk-dots { display: flex; justify-content: center; gap: 7px; }
  .kk-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; cursor: pointer; transition: background 0.3s; border: none; padding: 0; }
  .kk-dot.active { background: #d4af37; }

  /* Testimonials */
  .kk-test-wrap { position: relative; min-height: 120px; margin: 0 0 12px; }
  .kk-test { position: absolute; width: 100%; opacity: 0; transition: opacity 0.5s; box-sizing: border-box; }
  .kk-test.active { opacity: 1; }
  .kk-test q { display: block; font-size: 0.95rem; font-style: italic; color: #ccc; line-height: 1.6; margin: 0 0 10px; quotes: none; }
  .kk-test .author { font-size: 0.78rem; color: #d4af37; font-weight: 700; }
  .kk-test .result { font-size: 0.72rem; color: #777; margin-top: 2px; }
  .kk-test-dots { display: flex; justify-content: center; gap: 6px; }
  .kk-test-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; cursor: pointer; transition: background 0.3s; border: none; padding: 0; }
  .kk-test-dot.active { background: #d4af37; }

  /* Divider */
  .kk-divider { width: 50px; height: 1px; background: rgba(212,175,55,0.3); margin: 48px auto; }

  /* Bottom CTA */
  .kk-bottom-cta { margin: 0 auto; max-width: 480px; }
  .kk-bottom-cta h3 { font-size: 1.4rem; font-weight: 700; color: #fff; margin: 0 0 6px; }
  .kk-bottom-cta .bottom-sub { font-size: 0.88rem; color: #777; margin: 0 0 24px; line-height: 1.5; }
  .kk-bottom-cta .kk-btn { font-size: 1.05rem; padding: 18px; }

  /* Responsive */
  @media (max-width: 600px) {
    #kk-form .row { flex-direction: column; }
    .kk-perk-wrap { height: 130px; }
    .kk-test-wrap { min-height: 140px; }
  }
</style>
<script>
document.addEventListener("DOMContentLoaded", function() {
  var tgt = document.getElementById("page") || document.querySelector("[role='main']") || document.querySelector("main") || document.body;
  var pg = document.createElement("div");
  pg.id = "kk-page";
  pg.innerHTML = ''
    + '<h2>Level Up Every Week</h2>'
    + '<p class="sub">Free weekly breakdown of the best insights on health, wealth, relationships &amp; personal growth. Join the community.</p>'

    /* Subscribe Form */
    + '<form id="kk-form">'
    + '<div class="row"><input type="text" name="first_name" placeholder="First Name" required><input type="text" name="last_name" placeholder="Last Name" required></div>'
    + '<input type="email" name="email" placeholder="Email Address" required>'
    + '<input type="tel" name="phone" placeholder="Phone (optional)">'
    + '<button type="submit" class="kk-btn" id="kk-btn">Subscribe Free</button>'
    + '</form>'
    + '<p id="kk-msg"></p>'
    + '<p class="kk-fine">No spam. Unsubscribe anytime. Your info stays private.</p>'

    /* Counter */
    + '<div class="kk-counter"><span>Join</span><span class="kk-counter-num" id="kk-count">0</span><span>+ subscribers</span></div>'

    /* Perks */
    + '<div class="kk-label">What You Get Every Week</div>'
    + '<div class="kk-perk-wrap" id="kk-perk-wrap"></div>'
    + '<div class="kk-dots" id="kk-perk-dots"></div>'

    /* Testimonials */
    + '<div class="kk-label">What Readers Are Saying</div>'
    + '<div class="kk-test-wrap" id="kk-test-wrap"></div>'
    + '<div class="kk-test-dots" id="kk-test-dots"></div>'

    /* Divider + Bottom CTA */
    + '<div class="kk-divider"></div>'
    + '<div class="kk-bottom-cta">'
    + '<h3>Ready to level up?</h3>'
    + '<p class="bottom-sub">Get actionable systems delivered every week. No fluff, no filler.</p>'
    + '<form id="kk-form-bottom">'
    + '<input type="email" name="email" placeholder="Your best email" required style="padding:14px 16px;border:1px solid #333;border-radius:8px;background:#111;color:#fff;font-size:0.95rem;font-family:inherit;outline:none;width:100%;box-sizing:border-box;margin:0 0 12px;">'
    + '<button type="submit" class="kk-btn">Send Me the Free Playbook</button>'
    + '</form>'
    + '<p id="kk-msg-bottom" style="margin:12px 0 0;font-size:0.85rem;min-height:22px;"></p>'
    + '<p class="kk-fine">Join 12,642+ readers. Cancel anytime.</p>'
    + '</div>';
  tgt.appendChild(pg);

  /* ---- Animated Counter ---- */
  var goal = 12642, cur = 0, inc = Math.ceil(goal / 90);
  var cEl = document.getElementById("kk-count");
  var cInt = setInterval(function() {
    cur += inc;
    if (cur >= goal) { cur = goal; clearInterval(cInt); }
    cEl.textContent = cur.toLocaleString();
  }, 22);

  /* ---- Perk Cards ---- */
  var perks = [
    { t: "One Actionable Health Protocol", d: "Backed by research, distilled into something you can start Monday morning." },
    { t: "A Wealth-Building System Breakdown", d: "Side hustles, automation income, affiliate strategies that actually generate revenue." },
    { t: "Relationship &amp; Communication Framework", d: "Scripts, boundaries, and mental models for navigating people without losing yourself." },
    { t: "Personal Growth Operating System", d: "Habits, routines, and mindset shifts from high performers, reverse-engineered for normal schedules." },
    { t: "Curated Tools &amp; Resources", d: "The apps, books, and templates the team actually uses. No sponsored recommendations." }
  ];
  var pw = document.getElementById("kk-perk-wrap");
  var pdots = document.getElementById("kk-perk-dots");
  var pidx = 0;
  perks.forEach(function(p, i) {
    var c = document.createElement("div");
    c.className = "kk-perk" + (i === 0 ? " active" : "");
    c.innerHTML = "<h4>" + p.t + "</h4><p>" + p.d + "</p>";
    pw.appendChild(c);
    var dot = document.createElement("div");
    dot.className = "kk-dot" + (i === 0 ? " active" : "");
    dot.onclick = (function(x) { return function() { setPerk(x); }; })(i);
    pdots.appendChild(dot);
  });
  function setPerk(i) {
    pidx = i;
    var cards = pw.querySelectorAll(".kk-perk");
    var dots = pdots.querySelectorAll(".kk-dot");
    for (var j = 0; j < cards.length; j++) {
      cards[j].className = "kk-perk" + (j === i ? " active" : "");
      dots[j].className = "kk-dot" + (j === i ? " active" : "");
    }
  }
  setInterval(function() { setPerk((pidx + 1) % perks.length); }, 4000);

  /* ---- Testimonials (10) ---- */
  var tests = [
    { q: "I gained 4,200 followers in 90 days using the content systems from this newsletter. No ads, no viral moments.", a: "Marcus T.", r: "+4,200 followers in 90 days" },
    { q: "Made $847 in affiliate commissions last month from strategies I picked up in a single issue.", a: "Priya K.", r: "$847 commissions in one month" },
    { q: "I used to spend 3 hours a day on content. Now my pipeline runs itself and I spend that time on strategy.", a: "Jordan M.", r: "3 hours/day saved on content" },
    { q: "The relationship frameworks alone are worth it. I handled a tough conversation at work and got promoted the next quarter.", a: "Alex R.", r: "Promotion after applying frameworks" },
    { q: "I launched my first automated YouTube channel using the playbook. 1,100 subscribers in the first month.", a: "Daniela S.", r: "1,100 subs in first month" },
    { q: "Every issue feels like someone handed me a cheat code. The health protocols changed my morning routine completely.", a: "Tyler W.", r: "Complete routine overhaul" },
    { q: "I was skeptical about another newsletter. Three weeks in, I had already implemented two new income streams.", a: "Keisha N.", r: "2 new income streams in 3 weeks" },
    { q: "The personal growth operating system issue was the single most useful thing I read all year. Printed it out.", a: "Ryan L.", r: "Best read of the year" },
    { q: "Shared it with my team at work. Now all five of us subscribe. The communication frameworks are gold.", a: "Megan F.", r: "Shared with entire team" },
    { q: "I went from zero online presence to 8,000 followers and $1,200/mo in 6 months. This newsletter was the blueprint.", a: "Chris B.", r: "8K followers + $1,200/mo in 6 months" }
  ];
  var tw = document.getElementById("kk-test-wrap");
  var tdots = document.getElementById("kk-test-dots");
  var tidx = 0;
  tests.forEach(function(t, i) {
    var c = document.createElement("div");
    c.className = "kk-test" + (i === 0 ? " active" : "");
    c.innerHTML = "<q>" + t.q + "</q><div class='author'>" + t.a + "</div><div class='result'>" + t.r + "</div>";
    tw.appendChild(c);
    var dot = document.createElement("div");
    dot.className = "kk-test-dot" + (i === 0 ? " active" : "");
    dot.onclick = (function(x) { return function() { setTest(x); }; })(i);
    tdots.appendChild(dot);
  });
  function setTest(i) {
    tidx = i;
    var cards = tw.querySelectorAll(".kk-test");
    var dots = tdots.querySelectorAll(".kk-test-dot");
    for (var j = 0; j < cards.length; j++) {
      cards[j].className = "kk-test" + (j === i ? " active" : "");
      dots[j].className = "kk-test-dot" + (j === i ? " active" : "");
    }
  }
  setInterval(function() { setTest((tidx + 1) % tests.length); }, 5000);

  /* ---- Form Handlers ---- */
  function bindForm(formId, msgId, btnLabel) {
    var f = document.getElementById(formId);
    var msg = document.getElementById(msgId);
    f.addEventListener("submit", function(e) {
      e.preventDefault();
      var fd = new FormData(f);
      var btn = f.querySelector(".kk-btn");
      var payload = {
        first_name: fd.get("first_name") || "",
        last_name: fd.get("last_name") || "",
        email: fd.get("email"),
        phone: fd.get("phone") || ""
      };
      btn.disabled = true;
      btn.textContent = "Subscribing...";
      msg.textContent = "";
      fetch("https://kneedsknows-newsletter.onrender.com/api/subscribe", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
      })
      .then(function(res) {
        return res.json().then(function(data) {
          if (!res.ok) throw new Error(data.detail || "Something went wrong");
          msg.style.color = "#d4af37";
          msg.textContent = data.message;
          f.reset();
        });
      })
      .catch(function(err) {
        msg.style.color = "#ff4444";
        msg.textContent = err.message || "Connection error. Please try again.";
      })
      .finally(function() {
        btn.disabled = false;
        btn.textContent = btnLabel;
      });
    });
  }
  bindForm("kk-form", "kk-msg", "Subscribe Free");
  bindForm("kk-form-bottom", "kk-msg-bottom", "Send Me the Free Playbook");
});
</script>
