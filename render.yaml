# Render deployment config for newsletter signup API
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: kneedsknows-newsletter
    runtime: python
    buildCommand: pip install fastapi uvicorn pydantic[email]
    startCommand: uvicorn subscribe:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
